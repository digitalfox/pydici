{% load i18n %}
{# display lead or activity states as a donut #}
{# context : "data" in compatible billboard.js format "title" of donut and "target" id of div #}

<div class="col-lg-3 col-sm-6 col-12">
    <div id="{{ target }}"></div>
    {% if data %}
    <script type="text/javascript">
    $(document).ready(function() {
            var chart_leads_stat = bb.generate({
                bindto: '#{{ target }}',
                data: {
                    columns: {{ data | safe }},
                    type : 'donut',
                    colors: {{ state_colors | safe }},
                    names: {{ state_names | safe }},
                },
                tooltip: {
                    format: {
                        value: function (value, ratio, id, index) { return value; }
                        }
                    },
                donut: {
                    title: '{% if title %}{{ title }}{% else %}{% trans "Leads" %}{% endif %}',
                    label: {
                        format: function (value) { return value; },
                        threshold: 0.001,
                        },
                    },
            });
    });
    </script>
    {% endif %}
</div>
